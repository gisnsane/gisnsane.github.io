<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IgpinSync — by Gisnsane</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Instrument+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0b;
    --surface: #131315;
    --surface2: #1a1a1d;
    --border: #252528;
    --accent-pin: #E60023;
    --accent: #ff4d6d;
    --accent-soft: rgba(255,77,109,0.1);
    --text: #ececec;
    --text-muted: #72727f;
    --text-dim: #3f3f4a;
    --radius: 14px;
    --radius-sm: 9px;
    --font-display: 'Bebas Neue', sans-serif;
    --font-body: 'Instrument Sans', sans-serif;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:var(--font-body); min-height:100vh; overflow-x:hidden; }

  #progress-bar { position:fixed; top:0; left:0; height:2px; background:var(--accent); transition:width .3s; z-index:9999; box-shadow:0 0 10px var(--accent); }

  header { padding:22px 40px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid var(--border); position:sticky; top:0; background:rgba(10,10,11,.93); backdrop-filter:blur(24px); z-index:100; }
  .logo { font-family:var(--font-display); font-size:26px; letter-spacing:2px; display:flex; align-items:center; gap:10px; }
  .logo-pip { width:7px; height:7px; border-radius:50%; background:var(--accent); box-shadow:0 0 8px var(--accent); animation:glow 2s ease-in-out infinite; }
  @keyframes glow { 0%,100%{opacity:1;box-shadow:0 0 8px var(--accent)} 50%{opacity:.5;box-shadow:0 0 3px var(--accent)} }
  .logo span { color:var(--accent); }
  .status-pill { font-size:12px; color:var(--text-muted); background:var(--surface2); padding:6px 14px; border-radius:100px; border:1px solid var(--border); display:flex; align-items:center; gap:6px; }
  .status-dot { width:5px; height:5px; border-radius:50%; background:#4ade80; animation:glow 2s infinite; }

  main { max-width:1280px; margin:0 auto; padding:36px 40px 80px; }
  .page-header { margin-bottom:36px; }
  .page-header h1 { font-family:var(--font-display); font-size:48px; letter-spacing:3px; line-height:1; margin-bottom:8px; }
  .page-header h1 em { font-style:normal; color:var(--accent); }
  .page-header p { color:var(--text-muted); font-size:14px; }

  #loading-state { display:flex; flex-direction:column; align-items:center; padding:120px 0; gap:18px; }
  .spinner { width:40px; height:40px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .75s linear infinite; }
  @keyframes spin { to{transform:rotate(360deg)} }
  .loading-text { font-family:var(--font-display); font-size:20px; letter-spacing:2px; color:var(--text-muted); }

  .toolbar { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; gap:12px; flex-wrap:wrap; }
  .toolbar-left { display:flex; align-items:center; gap:10px; }
  .count-badge { font-family:var(--font-display); font-size:15px; letter-spacing:1px; background:var(--accent-soft); color:var(--accent); padding:5px 14px; border-radius:100px; border:1px solid rgba(255,77,109,.2); }
  .select-all-btn { background:transparent; border:1px solid var(--border); color:var(--text-muted); padding:6px 14px; border-radius:100px; cursor:pointer; font-family:var(--font-body); font-size:12px; transition:all .2s; }
  .select-all-btn:hover { border-color:var(--accent); color:var(--accent); }
  .publish-btn { background:var(--accent-pin); color:white; border:none; padding:11px 26px; border-radius:100px; cursor:pointer; font-family:var(--font-display); font-size:16px; letter-spacing:1.5px; transition:all .2s; }
  .publish-btn:hover:not(:disabled) { transform:translateY(-2px); box-shadow:0 8px 28px rgba(230,0,35,.4); }
  .publish-btn:disabled { opacity:.35; cursor:not-allowed; }

  #photo-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:14px; }

  .photo-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; cursor:pointer; transition:all .22s cubic-bezier(.34,1.56,.64,1); position:relative; }
  .photo-card:hover { transform:translateY(-4px); border-color:rgba(255,77,109,.25); box-shadow:0 14px 36px rgba(0,0,0,.5); }
  .photo-card.selected { border-color:var(--accent); box-shadow:0 0 0 2px rgba(255,77,109,.2),0 10px 30px rgba(0,0,0,.4); }

  .card-img-wrap { position:relative; aspect-ratio:1; overflow:hidden; background:var(--surface2); }
  .card-img-wrap::after { content:''; position:absolute; inset:0; background:rgba(255,77,109,.12); opacity:0; transition:opacity .2s; }
  .photo-card.selected .card-img-wrap::after { opacity:1; }
  .card-img-wrap img { width:100%; height:100%; object-fit:cover; display:block; transition:transform .4s; }
  .photo-card:hover .card-img-wrap img { transform:scale(1.05); }

  .carousel-badge { position:absolute; top:10px; left:10px; background:rgba(0,0,0,.7); backdrop-filter:blur(8px); color:white; font-size:10px; font-weight:600; padding:3px 8px; border-radius:100px; letter-spacing:.5px; z-index:2; border:1px solid rgba(255,255,255,.1); }
  .check-circle { position:absolute; top:10px; right:10px; width:26px; height:26px; border-radius:50%; background:rgba(10,10,11,.75); border:1.5px solid rgba(255,255,255,.25); backdrop-filter:blur(8px); display:flex; align-items:center; justify-content:center; z-index:2; transition:all .2s; }
  .photo-card.selected .check-circle { background:var(--accent); border-color:var(--accent); }
  .check-circle svg { width:12px; height:12px; stroke:white; stroke-width:2.5; opacity:0; transform:scale(.4); transition:all .2s cubic-bezier(.34,1.56,.64,1); }
  .photo-card.selected .check-circle svg { opacity:1; transform:scale(1); }

  .card-body { padding:12px 14px 14px; }
  .card-caption { font-size:12px; color:var(--text-muted); line-height:1.5; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; margin-bottom:8px; }
  .card-meta { display:flex; align-items:center; justify-content:space-between; }
  .card-date { font-size:11px; color:var(--text-dim); }
  .card-type { font-size:10px; color:var(--text-dim); background:var(--surface2); padding:3px 8px; border-radius:100px; text-transform:uppercase; letter-spacing:.5px; font-weight:600; }
  .card-type.carousel { color:#a78bfa; background:rgba(167,139,250,.1); }

  .load-more-wrap { text-align:center; margin-top:28px; }
  .load-more-btn { background:var(--surface); border:1px solid var(--border); color:var(--text-muted); padding:11px 28px; border-radius:100px; cursor:pointer; font-family:var(--font-body); font-size:13px; transition:all .2s; }
  .load-more-btn:hover { border-color:var(--accent); color:var(--accent); }

  /* MODAL */
  .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.8); backdrop-filter:blur(16px); z-index:500; display:flex; align-items:center; justify-content:center; padding:20px; opacity:0; pointer-events:none; transition:opacity .25s; }
  .modal-overlay.active { opacity:1; pointer-events:all; }
  .modal { background:var(--surface); border:1px solid var(--border); border-radius:20px; width:100%; max-width:700px; max-height:92vh; overflow-y:auto; transform:translateY(16px) scale(.98); transition:transform .3s cubic-bezier(.34,1.56,.64,1); }
  .modal-overlay.active .modal { transform:translateY(0) scale(1); }
  .modal-header { padding:22px 24px 0; display:flex; align-items:center; justify-content:space-between; }
  .modal-title { font-family:var(--font-display); font-size:22px; letter-spacing:2px; }
  .modal-close { width:30px; height:30px; border-radius:50%; background:var(--surface2); border:1px solid var(--border); color:var(--text-muted); cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:16px; transition:all .2s; line-height:1; }
  .modal-close:hover { background:var(--border); color:var(--text); }
  .modal-body { padding:18px 24px 24px; display:flex; flex-direction:column; gap:16px; }

  /* IMAGE FIX — object-fit:contain so full image is visible */
  .modal-img-wrap { width:100%; max-height:340px; border-radius:var(--radius-sm); overflow:hidden; background:var(--surface2); display:flex; align-items:center; justify-content:center; border:1px solid var(--border); }
  .modal-img-wrap img { width:100%; max-height:340px; object-fit:contain; display:block; }

  .field-group { display:flex; flex-direction:column; gap:7px; }
  .field-label { font-size:11px; font-weight:600; color:var(--text-muted); text-transform:uppercase; letter-spacing:1px; display:flex; align-items:center; gap:8px; }
  .ai-badge { background:rgba(139,92,246,.12); color:#a78bfa; padding:2px 8px; border-radius:100px; font-size:10px; letter-spacing:.3px; border:1px solid rgba(139,92,246,.2); text-transform:none; font-weight:500; }
  .field-input,.field-textarea,.field-select { background:var(--surface2); border:1px solid var(--border); border-radius:var(--radius-sm); color:var(--text); font-family:var(--font-body); font-size:14px; padding:11px 14px; transition:border-color .2s; width:100%; }
  .field-input:focus,.field-textarea:focus,.field-select:focus { outline:none; border-color:rgba(255,77,109,.35); }
  .field-textarea { resize:vertical; min-height:90px; line-height:1.6; }
  .field-select option { background:var(--surface2); }

  .ai-generating { display:flex; align-items:center; gap:10px; font-size:13px; color:#a78bfa; padding:10px 14px; background:rgba(139,92,246,.07); border-radius:var(--radius-sm); border:1px solid rgba(139,92,246,.15); }
  .ai-dots { display:flex; gap:4px; }
  .ai-dots span { width:5px; height:5px; background:#a78bfa; border-radius:50%; animation:bounce 1.2s infinite; }
  .ai-dots span:nth-child(2){animation-delay:.2s} .ai-dots span:nth-child(3){animation-delay:.4s}
  @keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-5px)} }

  .modal-actions { display:flex; gap:8px; justify-content:flex-end; flex-wrap:wrap; }
  .btn-secondary { background:transparent; border:1px solid var(--border); color:var(--text-muted); padding:9px 18px; border-radius:100px; cursor:pointer; font-family:var(--font-body); font-size:13px; transition:all .2s; }
  .btn-secondary:hover { border-color:var(--text-muted); color:var(--text); }
  .btn-ai { background:linear-gradient(135deg,#5b21b6,#7c3aed); color:white; border:none; padding:9px 18px; border-radius:100px; cursor:pointer; font-family:var(--font-display); font-size:14px; letter-spacing:1px; transition:all .2s; display:flex; align-items:center; gap:6px; }
  .btn-ai:hover:not(:disabled) { transform:translateY(-1px); box-shadow:0 6px 20px rgba(124,58,237,.4); }
  .btn-ai:disabled { opacity:.4; cursor:not-allowed; }
  .btn-confirm { background:var(--accent-pin); color:white; border:none; padding:9px 22px; border-radius:100px; cursor:pointer; font-family:var(--font-display); font-size:14px; letter-spacing:1px; transition:all .2s; }
  .btn-confirm:hover { transform:translateY(-1px); box-shadow:0 6px 20px rgba(230,0,35,.4); }

  #toast-container { position:fixed; bottom:28px; right:28px; z-index:999; display:flex; flex-direction:column; gap:8px; }
  .toast { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-sm); padding:13px 18px; font-size:13px; max-width:320px; animation:slideIn .3s cubic-bezier(.34,1.56,.64,1); display:flex; align-items:center; gap:10px; box-shadow:0 8px 32px rgba(0,0,0,.5); }
  .toast.success{border-color:rgba(74,222,128,.3)} .toast.error{border-color:rgba(255,77,109,.3)} .toast.info{border-color:rgba(139,92,246,.3)}
  @keyframes slideIn { from{transform:translateX(80px);opacity:0} to{transform:translateX(0);opacity:1} }

  .empty-state { text-align:center; padding:80px 40px; color:var(--text-muted); }
  .empty-state h3 { font-family:var(--font-display); font-size:24px; letter-spacing:2px; margin-bottom:8px; }
  ::-webkit-scrollbar{width:5px} ::-webkit-scrollbar-track{background:transparent} ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>
</head>
<body>

<div id="progress-bar" style="width:0%"></div>

<header>
  <div class="logo"><div class="logo-pip"></div>IGPIN<span>SYNC</span></div>
  <div class="status-pill"><div class="status-dot"></div><span id="status-text">Conectando...</span></div>
</header>

<main>
  <div class="page-header">
    <h1>TUS FOTOS DE <em>INSTAGRAM</em></h1>
    <p>Selecciona las que quieres subir a Pinterest como Pins optimizados con IA</p>
  </div>

  <div id="loading-state">
    <div class="spinner"></div>
    <div class="loading-text">CARGANDO FOTOS...</div>
  </div>

  <div id="content-state" style="display:none">
    <div class="toolbar">
      <div class="toolbar-left">
        <span class="count-badge" id="selected-count">0 SELECCIONADAS</span>
        <button class="select-all-btn" onclick="toggleSelectAll()">Seleccionar todas</button>
      </div>
      <button class="publish-btn" id="publish-btn" onclick="openPublishFlow()" disabled>↑ SUBIR A PINTEREST</button>
    </div>
    <div id="photo-grid"></div>
    <div class="load-more-wrap" id="load-more-wrap" style="display:none">
      <button class="load-more-btn" onclick="loadMore()">Cargar más fotos</button>
    </div>
  </div>

  <div id="error-state" style="display:none" class="empty-state">
    <h3>ERROR AL CARGAR</h3>
    <p id="error-msg"></p>
  </div>
</main>

<div class="modal-overlay" id="edit-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">EDITAR PIN</div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="modal-img-wrap"><img id="modal-img" src="" alt=""></div>
      <div id="ai-status" style="display:none" class="ai-generating">
        <div class="ai-dots"><span></span><span></span><span></span></div>
        Generando contenido optimizado para Pinterest...
      </div>
      <div class="field-group">
        <label class="field-label">Título del Pin <span class="ai-badge">✦ IA</span></label>
        <input type="text" id="modal-title" class="field-input" placeholder="Título optimizado para búsquedas...">
      </div>
      <div class="field-group">
        <label class="field-label">Descripción <span class="ai-badge">✦ IA</span></label>
        <textarea id="modal-desc" class="field-textarea" placeholder="Descripción con keywords para Pinterest..."></textarea>
      </div>
      <div class="field-group">
        <label class="field-label">Tablero de Pinterest</label>
        <select id="modal-board" class="field-select">
          <option value="__new__">✦ Crear tablero automáticamente</option>
        </select>
      </div>
      <div class="modal-actions">
        <button class="btn-secondary" onclick="closeModal()">Cancelar</button>
        <button class="btn-ai" id="btn-regenerate" onclick="regenerateAI()">✦ REGENERAR</button>
        <button class="btn-confirm" onclick="confirmPublish()">PUBLICAR PIN →</button>
      </div>
    </div>
  </div>
</div>

<div id="toast-container"></div>

<script>
const IG_TOKEN   = 'IGAAchPZAM3N9pBZAFlCOEF4NEo3X1poRS0yRzMyZAGtWZA0ZACMEpYVlZA1b1VNY2U0WkRHZAWpjR1hkSmY0bjg2YmpuQm8tRjNfbWFZAWDRETE5kNUVacVhiVXMwUVA5U1owU0Y3cnhyVDVNdHA4clBJLTFuVzlrQXlrOEM4eWk1WmRtQQZDZD';
const IG_USER_ID = '17841407031372221';
const PIN_TOKEN  = 'pina_AEAS76AXADXB6BAAGCAMQDXQJOGVZHQBACGSOB7TC7EJOMP7FUHNNDFVPOP7CDGLSYKG2ONKW63AP2TMBZXI7ZMQGQDVA2AA';
const ANTHROPIC_KEY = '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';
const CLAUDE_MODEL = 'claude-sonnet-4-20250514';

let allPhotos = [], selectedIds = new Set(), nextCursor = null;
let pinterestBoards = [], currentEditPhoto = null, allSelected = false, isGenerating = false;

async function init() {
  setProgress(10);
  try {
    await loadPhotos();
    setProgress(60);
    await loadPinterestBoards();
    setProgress(100);
    document.getElementById('status-text').textContent = 'Conectado ✓';
    setTimeout(() => setProgress(0), 600);
  } catch(e) { showError(e.message); setProgress(0); }
}

async function loadPhotos() {
  const url = `https://graph.instagram.com/${IG_USER_ID}/media?fields=id,media_type,media_url,thumbnail_url,caption,timestamp&limit=24&access_token=${IG_TOKEN}`;
  const res = await fetch(url);
  const data = await res.json();
  if (data.error) throw new Error(`Instagram: ${data.error.message}`);
  nextCursor = data.paging?.cursors?.after || null;
  const expanded = await expandCarousels(data.data || []);
  allPhotos = expanded;
  renderPhotos(expanded);
  document.getElementById('loading-state').style.display = 'none';
  document.getElementById('content-state').style.display = 'block';
  if (nextCursor) document.getElementById('load-more-wrap').style.display = 'block';
}

async function loadMore() {
  if (!nextCursor) return;
  const url = `https://graph.instagram.com/${IG_USER_ID}/media?fields=id,media_type,media_url,thumbnail_url,caption,timestamp&limit=24&after=${nextCursor}&access_token=${IG_TOKEN}`;
  const res = await fetch(url);
  const data = await res.json();
  if (data.error) { showToast('Error cargando más fotos', 'error'); return; }
  nextCursor = data.paging?.cursors?.after || null;
  const expanded = await expandCarousels(data.data || []);
  allPhotos = [...allPhotos, ...expanded];
  renderPhotos(expanded, true);
  if (!nextCursor) document.getElementById('load-more-wrap').style.display = 'none';
}

async function expandCarousels(items) {
  const result = [];
  for (const item of items) {
    if (item.media_type === 'IMAGE') {
      result.push({ ...item, _isChild: false });
    } else if (item.media_type === 'CAROUSEL_ALBUM') {
      try {
        const childUrl = `https://graph.instagram.com/${item.id}/children?fields=id,media_type,media_url,timestamp&access_token=${IG_TOKEN}`;
        const childRes = await fetch(childUrl);
        const childData = await childRes.json();
        const children = (childData.data || []).filter(c => c.media_type === 'IMAGE');
        children.forEach((child, idx) => {
          result.push({ ...child, caption: item.caption || '', _isChild: true, _parentId: item.id, _childIndex: idx + 1, _totalChildren: children.length });
        });
      } catch(e) {
        // fallback: push cover
        result.push({ ...item, _isChild: false });
      }
    }
  }
  return result;
}

async function loadPinterestBoards() {
  try {
    const res = await fetch('https://api.pinterest.com/v5/boards?page_size=50', { headers: { 'Authorization': `Bearer ${PIN_TOKEN}` } });
    const data = await res.json();
    pinterestBoards = data.items || [];
    updateBoardSelect();
  } catch(e) { pinterestBoards = []; }
}

function updateBoardSelect() {
  const sel = document.getElementById('modal-board');
  sel.innerHTML = '<option value="__new__">✦ Crear tablero automáticamente</option>';
  pinterestBoards.forEach(b => {
    const opt = document.createElement('option');
    opt.value = b.id; opt.textContent = b.name;
    sel.appendChild(opt);
  });
}

function renderPhotos(photos, append = false) {
  const grid = document.getElementById('photo-grid');
  if (!append) grid.innerHTML = '';
  if (!photos.length && !append) { grid.innerHTML = '<div class="empty-state"><h3>SIN FOTOS</h3><p>No se encontraron imágenes</p></div>'; return; }
  photos.forEach(photo => {
    if (!photo.media_url) return;
    const caption = photo.caption || '';
    const date = new Date(photo.timestamp).toLocaleDateString('es', { day:'2-digit', month:'short', year:'numeric' });
    const isChild = photo._isChild;
    const card = document.createElement('div');
    card.className = 'photo-card'; card.dataset.id = photo.id;
    card.innerHTML = `
      <div class="card-img-wrap">
        <img src="${photo.media_url}" alt="" loading="lazy">
        ${isChild ? `<div class="carousel-badge">⊞ ${photo._childIndex}/${photo._totalChildren}</div>` : ''}
        <div class="check-circle"><svg viewBox="0 0 24 24" fill="none"><polyline points="20 6 9 17 4 12"/></svg></div>
      </div>
      <div class="card-body">
        <div class="card-caption">${caption || '<em style="opacity:.35">Sin descripción</em>'}</div>
        <div class="card-meta">
          <span class="card-date">${date}</span>
          <span class="card-type ${isChild ? 'carousel' : ''}">${isChild ? 'Carrusel' : 'Foto'}</span>
        </div>
      </div>`;
    card.addEventListener('click', () => toggleSelect(photo.id, card));
    grid.appendChild(card);
  });
}

function toggleSelect(id, card) {
  if (selectedIds.has(id)) { selectedIds.delete(id); card.classList.remove('selected'); }
  else { selectedIds.add(id); card.classList.add('selected'); }
  updateSelectionUI();
}

function toggleSelectAll() {
  allSelected = !allSelected;
  document.querySelectorAll('.photo-card').forEach(card => {
    const id = card.dataset.id;
    if (allSelected) { selectedIds.add(id); card.classList.add('selected'); }
    else { selectedIds.delete(id); card.classList.remove('selected'); }
  });
  updateSelectionUI();
}

function updateSelectionUI() {
  const n = selectedIds.size;
  document.getElementById('selected-count').textContent = n === 0 ? '0 SELECCIONADAS' : `${n} SELECCIONADA${n>1?'S':''}`;
  document.getElementById('publish-btn').disabled = n === 0;
}

function openPublishFlow() {
  if (!selectedIds.size) return;
  const photo = allPhotos.find(p => p.id === [...selectedIds][0]);
  if (photo) openEditModal(photo);
}

function openEditModal(photo) {
  currentEditPhoto = photo;
  document.getElementById('modal-img').src = photo.media_url || '';
  document.getElementById('modal-title').value = '';
  document.getElementById('modal-desc').value = '';
  document.getElementById('modal-board').dataset.suggestedName = '';
  updateBoardSelect();
  document.getElementById('edit-modal').classList.add('active');
  generateAIContent(photo);
}

function closeModal() {
  document.getElementById('edit-modal').classList.remove('active');
  currentEditPhoto = null;
}

async function generateAIContent(photo) {
  if (isGenerating) return;
  isGenerating = true;
  const aiStatus = document.getElementById('ai-status');
  const btnRegen = document.getElementById('btn-regenerate');
  aiStatus.style.display = 'flex'; btnRegen.disabled = true;
  document.getElementById('modal-title').value = '';
  document.getElementById('modal-desc').value = '';
  try {
    const caption = photo.caption || '';
    const prompt = `Eres experto en SEO para Pinterest y fotografía profesional.
Caption de Instagram: "${caption}"
Genera:
1. TÍTULO atractivo para Pin (máx 100 chars) con keywords de fotografía
2. DESCRIPCIÓN optimizada (150-200 palabras) con keywords naturales + hashtags al final
3. CATEGORÍA de tablero (ej: "Fotografía Urbana", "Retratos", "Paisajes", "Naturaleza", "Arquitectura", "Blanco y Negro", "Street Photography")
Responde ÚNICAMENTE con JSON válido sin markdown:
{"titulo":"...","descripcion":"...","categoria":"..."}`;

    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': ANTHROPIC_KEY, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
      body: JSON.stringify({ model: CLAUDE_MODEL, max_tokens: 1000, messages: [{ role: 'user', content: prompt }] })
    });
    const data = await response.json();
    const rawText = (data.content || []).find(b => b.type === 'text')?.text || '{}';
    const result = JSON.parse(rawText.replace(/```json|```/g, '').trim());
    document.getElementById('modal-title').value = result.titulo || '';
    document.getElementById('modal-desc').value = result.descripcion || '';
    const cat = (result.categoria || '').toLowerCase();
    const match = pinterestBoards.find(b => b.name.toLowerCase().includes(cat.split(' ')[0]));
    const boardSel = document.getElementById('modal-board');
    if (match) { boardSel.value = match.id; }
    else { boardSel.value = '__new__'; boardSel.dataset.suggestedName = result.categoria || 'Fotografía'; }
  } catch(e) {
    console.error('AI error:', e);
    showToast('Error generando contenido con IA', 'error');
  } finally {
    aiStatus.style.display = 'none'; btnRegen.disabled = false; isGenerating = false;
  }
}

async function regenerateAI() {
  if (!currentEditPhoto || isGenerating) return;
  await generateAIContent(currentEditPhoto);
}

async function confirmPublish() {
  const title = document.getElementById('modal-title').value.trim();
  const desc = document.getElementById('modal-desc').value.trim();
  const boardSel = document.getElementById('modal-board');
  const boardId = boardSel.value;
  const suggestedName = boardSel.dataset.suggestedName || 'Fotografía';
  if (!title) { showToast('Agrega un título al Pin', 'error'); return; }
  closeModal();
  const photos = [...selectedIds].map(id => allPhotos.find(p => p.id === id)).filter(Boolean);
  showToast(`Publicando ${photos.length} pin${photos.length > 1 ? 's' : ''}...`, 'info');
  setProgress(20);
  let resolvedBoardId = boardId;
  if (boardId === '__new__') {
    try { resolvedBoardId = await createPinterestBoard(suggestedName); showToast(`Tablero "${suggestedName}" creado ✓`, 'success'); }
    catch(e) { showToast(`Error creando tablero: ${e.message}`, 'error'); setProgress(0); return; }
  }
  setProgress(40);
  let ok = 0, fail = 0;
  for (let i = 0; i < photos.length; i++) {
    setProgress(40 + Math.round((i / photos.length) * 55));
    try {
      let pinTitle = title, pinDesc = desc;
      if (i > 0) {
        try { const ai = await generateAIForPhoto(photos[i]); pinTitle = ai.titulo || title; pinDesc = ai.descripcion || desc; } catch(_) {}
      }
      await publishPin(photos[i].media_url, pinTitle, pinDesc, resolvedBoardId, photos[i].id);
      ok++;
    } catch(e) { fail++; console.error(e); }
  }
  setProgress(100); setTimeout(() => setProgress(0), 500);
  if (ok > 0) { showToast(`✓ ${ok} pin${ok>1?'s publicados':' publicado'} en Pinterest`, 'success'); selectedIds.clear(); document.querySelectorAll('.photo-card.selected').forEach(c=>c.classList.remove('selected')); updateSelectionUI(); }
  if (fail > 0) showToast(`${fail} pin${fail>1?'s':''} no se pudo${fail>1?'ieron':''} publicar`, 'error');
}

async function generateAIForPhoto(photo) {
  const prompt = `Genera título y descripción para Pinterest.
Caption: "${photo.caption || ''}"
Solo JSON: {"titulo":"...","descripcion":"...","categoria":"..."}`;
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST', headers: { 'Content-Type': 'application/json', 'x-api-key': ANTHROPIC_KEY, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
    body: JSON.stringify({ model: CLAUDE_MODEL, max_tokens: 600, messages: [{ role: 'user', content: prompt }] })
  });
  const data = await res.json();
  const text = (data.content || []).find(b => b.type === 'text')?.text || '{}';
  return JSON.parse(text.replace(/```json|```/g, '').trim());
}

async function createPinterestBoard(name) {
  const res = await fetch('https://api.pinterest.com/v5/boards', {
    method: 'POST', headers: { 'Authorization': `Bearer ${PIN_TOKEN}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ name, description: `Fotografía — ${name}` })
  });
  const data = await res.json();
  if (!data.id) throw new Error(data.message || 'Sin acceso de escritura — espera aprobación del Trial');
  pinterestBoards.push(data); return data.id;
}

async function publishPin(imageUrl, title, description, boardId, igId) {
  const res = await fetch('https://api.pinterest.com/v5/pins', {
    method: 'POST', headers: { 'Authorization': `Bearer ${PIN_TOKEN}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ board_id: boardId, title: title.slice(0,100), description: description.slice(0,500), media_source: { source_type: 'image_url', url: imageUrl }, link: `https://www.instagram.com/p/${igId}/` })
  });
  const data = await res.json();
  if (!data.id) throw new Error(data.message || 'Sin acceso de escritura');
  return data;
}

function setProgress(pct) { document.getElementById('progress-bar').style.width = pct + '%'; }

function showToast(msg, type = 'info') {
  const icons = { success:'✓', error:'✕', info:'◎' };
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.innerHTML = `<span>${icons[type]}</span><span>${msg}</span>`;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => el.remove(), 4500);
}

function showError(msg) {
  document.getElementById('loading-state').style.display = 'none';
  document.getElementById('error-state').style.display = 'block';
  document.getElementById('error-msg').textContent = msg;
}

document.getElementById('edit-modal').addEventListener('click', e => { if (e.target === document.getElementById('edit-modal')) closeModal(); });

init();
</script>
